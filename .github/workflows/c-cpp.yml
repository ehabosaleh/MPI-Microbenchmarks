name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: make distcheck
      run: |
        ./autogen.sh
        mpirun -np 36 ./bin/neighbor-overlap-microbenchmark
